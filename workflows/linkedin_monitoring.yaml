name: LinkedIn Monitoring Workflow
description: Monitor LinkedIn for accepted connections, new messages, and trigger follow-ups

version: 1.0.0

agents:
  - linkedin_followup_agent

skills:
  - linkedin_monitor_connections
  - linkedin_update_relationship

steps:
  - id: validate_session
    action: linkedin_validate_session
    input:
      user_id: "{{inputs.user_id}}"
    output_var: session_status

  - id: check_updates
    action: linkedin_monitor_connections
    input:
      user_id: "{{inputs.user_id}}"
    output_var: updates

  - id: process_accepted_connections
    foreach: "{{steps.check_updates.output.accepted_connections}}"
    action: linkedin_update_relationship
    input:
      user_id: "{{inputs.user_id}}"
      linkedin_url: "{{item.linkedin_url}}"
      new_stage: "connection_accepted"
      contact_name: "{{item.name}}"
    output_var: accepted_updates

  - id: record_acceptance_events
    foreach: "{{steps.check_updates.output.accepted_connections}}"
    action: mongodb_insert
    input:
      collection: tracking_events
      document:
        user_id: "{{inputs.user_id}}"
        event_type: "linkedin_connection_accepted"
        linkedin_url: "{{item.linkedin_url}}"
        contact_name: "{{item.name}}"
        channel: "linkedin"
        timestamp: "{{inputs.timestamp}}"
    output_var: event_results

  - id: store_new_messages
    foreach: "{{steps.check_updates.output.new_messages}}"
    action: mongodb_upsert
    input:
      collection: linkedin_conversations
      query:
        user_id: "{{inputs.user_id}}"
        contact_linkedin_url: "{{item.linkedin_url}}"
      doc:
        user_id: "{{inputs.user_id}}"
        contact_linkedin_url: "{{item.linkedin_url}}"
        contact_name: "{{item.from_name}}"
        last_message_preview: "{{item.preview}}"
        last_message_at: "{{inputs.timestamp}}"
        has_unread: true
    output_var: message_results

  - id: process_replies
    foreach: "{{steps.check_updates.output.new_messages}}"
    action: linkedin_update_relationship
    input:
      user_id: "{{inputs.user_id}}"
      linkedin_url: "{{item.linkedin_url}}"
      new_stage: "replied"
    output_var: reply_updates

  - id: notify_user
    action: websocket_broadcast
    continue_on_failure: true
    input:
      user_id: "{{inputs.user_id}}"
      event: "linkedin_updates"
      data:
        accepted_count: "{{steps.check_updates.output.accepted_connections}}"
        new_messages_count: "{{steps.check_updates.output.new_messages}}"
    output_var: notify_result

outputs:
  accepted_connections: "{{steps.check_updates.output.accepted_connections}}"
  new_messages: "{{steps.check_updates.output.new_messages}}"
  pending_invitations: "{{steps.check_updates.output.pending_invitations}}"

error_handling:
  - step: validate_session
    on_failure: log_error
    retry_count: 0

  - step: check_updates
    on_failure: log_error
    retry_count: 1

  - step: notify_user
    on_failure: log_and_continue
    retry_count: 0

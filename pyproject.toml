version: 1.0.0

name: AI Outreach Platform
description: Metadata-driven AI-powered outreach automation platform

requires:
  python: ">=3.10"
  mongo: ">=6.0"
  redis: ">=7.0"
  qdrant: ">=1.7"

dependencies:
  python: ">=3.10"
  fastapi: "^0.109.0"
  uvicorn: "^0.27.0"
  pydantic: "^2.5.0"
  motor: "^3.3.0"
  pymongo: "^4.6.0"
  redis: "^5.0.0"
  celery: "^5.3.0"
  groq: "^0.4.0"
  httpx: "^0.26.0"
  python-multipart: "^0.6.0"
  python-jose: "^3.3.0"
  passlib: "^1.7.0"
  bcrypt: "^4.1.0"
  qdrant-client: "^1.7.0"
  fastembed: "^3.9.0"
  playwright: "^1.40.0"
  cryptography: "^41.0.0"
  openpyxl: "^3.1.2"
  pypdf: "^4.0.0"

  apollo-hunter:
    git: "https://github.com/apolloio/apollo-python-api"
  hunterio: "^2.0.0"
  tavily-python: "^0.3.0"
  firecrawl-py: "^0.0.5"

dev_dependencies:
  pytest: "^7.4.0"
  pytest-asyncio: "^0.23.0"
  ruff: "^0.1.0"
  mypy: "^1.8.0"

settings:
  app_name: "AI Outreach Platform"
  api_prefix: "/api"
  cors_origins:
    - "http://localhost:3000"
    - "http://localhost:8080"
  env_prefix: "OUTREACH_"

files:
  agents: "./agents"
  skills: "./skills"
  workflows: "./workflows"
  tools: "./tools"
  memory: "./memory"
version: "3.8"

services:
  # MongoDB service
  mongodb:
    image: mongo:6.0
    container_name: outreach-mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  # Qdrant Vector database service
  qdrant:
    image: qdrant/qdrant:v1.9.0
    container_name: outreach-qdrant
    restart: always
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  mongodb_data:
  qdrant_data:
